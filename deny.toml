[advisories]
unmaintained = "workspace"
ignore = [
    # DoS via stack exhaustion in RFC 2822 parsing. Fix (0.3.47) requires
    # rustc 1.88, incompatible with our MSRV 1.85. Not exploitable here:
    # time is only used by tracing-appender for log timestamps, never
    # parsing user-provided input.
    "RUSTSEC-2026-0009",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
